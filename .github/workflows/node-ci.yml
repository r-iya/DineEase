name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 3. Install server dependencies
        run: |
          cd server
          npm install

      - name: 4. Run tests
        run: |
          cd server
          npm test

      - name: 5. Deploy (Dummy Step)
        if: success()
        run: echo "Deployment successful 🚀"
